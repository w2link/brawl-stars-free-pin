<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('main/background.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .logo {
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .logo img {
            width: 300px;
            height: auto;
            display: block;
        }

        .character {
            margin-bottom: 50px;
        }

        .character img {
            width: 250px;
            height: auto;
            display: block;
        }

        .button {
            cursor: pointer;
            transition: transform 0.1s;
            margin-bottom: 30px;
        }

        .button img {
            width: 350px;
            height: auto;
            display: block;
        }

        .button:active {
            transform: scale(0.95);
        }

        .button:hover {
            transform: scale(1.05);
        }

        .fake-web {
            position: absolute;
            bottom: 20px;
            opacity: 0.3;
        }

        .fake-web img {
            width: 400px;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="main/logo.png" alt="">
    </div>

    <div class="character">
        <img src="main/pin.png" alt="">
    </div>

    <div class="button" id="getButton">
        <img src="main/button.png" alt="">
    </div>

    <div class="fake-web">
        <img src="main/fakeweb.png" alt="">
    </div>

    <audio id="clickSound" preload="auto" loop>
        <source src="main/sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        const getButton = document.getElementById('getButton');
        const clickSound = document.getElementById('clickSound');

        getButton.addEventListener('click', function() {
            if (clickSound.paused) {
                clickSound.play();
            } else {
                clickSound.currentTime = 0;
            }
            
            this.style.transform = 'scale(0.9)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 100);
        });
    </script>
</body>
</html>
