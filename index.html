<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .logo img {
            width: 200px;
            height: auto;
            display: block;
        }

        .character {
            margin-bottom: 40px;
        }

        .character img {
            width: 200px;
            height: auto;
            display: block;
        }

        .button {
            cursor: pointer;            transition: transform 0.1s;
        }

        .button img {
            width: 350px;
            height: auto;
            display: block;
        }

        .button:active {
            transform: scale(0.95);
        }

        .button:hover {
            transform: scale(1.05);
        }

        .fake-web {
            position: absolute;
            bottom: 20px;
            opacity: 0.3;
        }

        .fake-web img {
            width: 400px;
            height: auto;
            display: block;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 250px;
        }
    </style>
</head>
<body>
    <!-- Логотип вверху слева -->
    <div class="logo">
        <img src="logo.png" alt="">
    </div>

    <!-- Контейнер по центру -->
    <div class="container">
        <!-- Pin выше кнопки -->
        <div class="character">
            <img src="pin.png" alt="">
        </div>
        <!-- Кнопка по центру -->
        <div class="button" id="getButton">
            <img src="button.png" alt="">
        </div>
    </div>

    <!-- FakeWeb внизу -->
    <div class="fake-web">
        <img src="fakeweb.png" alt="">
    </div>

    <!-- Звук -->
    <audio id="clickSound" preload="auto" loop>
        <source src="sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        const getButton = document.getElementById('getButton');
        const clickSound = document.getElementById('clickSound');

        getButton.addEventListener('click', function() {
            if (clickSound.paused) {
                clickSound.play();
            } else {
                clickSound.currentTime = 0;
            }
            
            this.style.transform = 'scale(0.9)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 100);
        });
    </script>
</body>
</html>
